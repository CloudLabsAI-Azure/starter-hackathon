version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: zava-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zava
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zava"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - zava-network

  # FastAPI Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zava-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./requirements.txt:/app/requirements.txt
      - ./.env:/app/.env
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/zava
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - zava-network
    restart: unless-stopped

  # MCP Server (AI Service)
  mcp-server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    container_name: zava-mcp-server
    ports:
      - "3001:3001"
    volumes:
      - ./mcp_server:/app
      - ./.env:/app/.env
    env_file:
      - .env
    command: python -m uvicorn server:app --host 0.0.0.0 --port 3001 --reload
    networks:
      - zava-network
    restart: unless-stopped

# Volumes
volumes:
  postgres_data:
    driver: local

# Networks
networks:
  zava-network:
    driver: bridge
